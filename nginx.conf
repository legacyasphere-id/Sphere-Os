server {
    listen 80;
    server_name _;

    # API
    location /api/ {
        proxy_pass http://app:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /sanctum/ {
        proxy_pass http://app:9000;
        proxy_set_header Host $host;
    }

    # Frontend SPA
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
